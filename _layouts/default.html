<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- COMPILED CSS (Correct Path) -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body style="background-image: linear-gradient(to bottom, rgba(2, 4, 10, 0.85), rgba(2, 4, 10, 0.95)), url('{{ '/assets/img/bg/space-deck.jpg' | relative_url }}'); background-size: cover; background-position: center; background-attachment: fixed;">

    <!-- Particle Background Container -->
    <div id="particle-swirl"></div>

    <!-- Main Layout Wrapper (Only ONE instance needed) -->
    <div class="terminal-wrapper">

        <!-- Header Area -->
        <header class="terminal-header">
            <div class="logo-area">
                <h1>{{ site.title }} <span>//</span> {{ site.subtitle }}</h1>
            </div>
            <nav class="main-nav">
                <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">HOME</a>
                <a href="{{ '/hub/' | relative_url }}" class="nav-link {% if page.url == '/hub/' %}active{% endif %}">HUBS</a>
                <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url == '/about/' %}active{% endif %}">INTEL</a>
                <a href="{{ '/join/' | relative_url }}" class="nav-link {% if page.url == '/join/' %}active{% endif %}">ENLIST</a>
                <a href="{{ '/contact/' | relative_url }}" class="nav-link {% if page.url == '/contact/' %}active{% endif %}">COMMS</a>
                <!-- Live Stream Indicator -->
                <a href="{{ '/watch/' | relative_url }}" class="nav-link" style="display: flex; align-items: center;">WATCH<span class="live-dot"id="nav-live-dot"></span>
                </a>
                </nav>
        </header>

        <!-- Main Content Area (Changed class to avoid conflict if needed, but terminal-card handles layout) -->
        <main class="content-wrapper">
            {{ content }}
        </main>

    </div>
    <footer style="text-align: center; padding: 20px; font-size: 0.8rem; color: #666; font-family: var(--font-mono);">
        <p>// MANAGED DEMOCRACY PROTOCOLS ACTIVE //</p>
        <p>&copy; {{ site.time | date: '%Y' }} DAGGER SQUAD. FOR SUPER EARTH.</p>
    </footer>


    <!-- Scripts -->

    <!-- 1. High Performance Background Particles (Correct Name) -->
    <script src="{{ '/assets/js/bg-particles.js' | relative_url }}"></script>

    <!-- 2. Main Site Logic (Twitch, RSS, etc.) -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

    <!-- 3. Leader Profile Modal Logic -->
    <script src="{{ '/assets/js/profile-modal.js' | relative_url }}"></script>

</body>
</html>
